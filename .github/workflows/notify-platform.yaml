name: Notify Platform Build

on:
  push:
    branches: [ main ]

jobs:
  trigger-platform:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger platform build
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.PLATFORM_REPO_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json"  \
          https://api.github.com/repos/iam-ismaeel/frappe-infrastructure/dispatches \
          -d '{"event_type":"app-updated","client_payload":{"app":"ismail_app"}}'
